<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown Stores - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff3b0 0%, #ffd166 50%, #f9a826 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(122, 89, 9, 0.18);
            background: rgba(255, 255, 255, 0.95);
        }
        .brand-badge {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #f4b400;
            color: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 12px;
        }
        .btn-primary {
            background-color: #f4b400;
            border-color: #f4b400;
            color: #1f1f1f;
        }
        .btn-primary:hover {
            background-color: #dea400;
            border-color: #dea400;
        }
        .text-primary {
            color: #b57300 !important;
        }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="card-body">
            <div class="brand-badge">CS</div>
            <h3 class="text-center mb-2 text-primary fw-bold">Crown Stores</h3>
            <h6 class="text-center text-muted mb-4">Retail Management System (CSRMS)</h6>
            <p class="text-center text-muted small mb-4">Secure access for sales agents, branch managers, and directors.</p>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
            </form>

            <div id="successMessage" class="alert alert-success mt-3 d-none" role="alert">
                Login successful! Redirecting...
            </div>

            <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert">
                Invalid credentials!
            </div>

            <div class="alert alert-info mt-3 small mb-0">
                Demo credentials: <strong>cashier</strong>, <strong>manager</strong>, or <strong>director</strong> with password <strong>123456</strong>.
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
